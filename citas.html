<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citas Agendadas - Promodent</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">Promodent</div>
      <ul class="nav-links">
        <li><a href="dashboard.html">Panel</a></li>
        <li><a href="login.html">Cerrar sesión</a></li>
      </ul>
    </nav>
  </header>

  <main class="pacientes">
    <h1>Citas agendadas</h1>
    <p>Listado de citas registradas en el sistema</p>

    <div class="tabla-pacientes">
      <table>
        <thead>
          <tr>
            <th>Paciente</th>
            <th>Tratamiento</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Juan Pérez</td>
            <td>Ortodoncia</td>
            <td>16/07/2025</td>
            <td>10:30 AM</td>
            <td>Confirmada</td>
          </tr>
          <!-- Puedes añadir más citas aquí -->
        </tbody>
      </table>
    </div>
  </main>
  
<script>
    function cargarCitas() {
        const lista = document.querySelector("tbody");
        // Aquí podrías leer de una clave "promodent_citas" en localStorage
        const citas = JSON.parse(localStorage.getItem("promodent_citas")) || [];
        
        if(citas.length > 0) {
            lista.innerHTML = "";
            citas.forEach(c => {
                lista.innerHTML += `
                    <tr>
                        <td>${c.paciente}</td>
                        <td>${c.tratamiento}</td>
                        <td>${c.fecha}</td>
                        <td>${c.hora}</td>
                        <td><span class="estado-confirmada">Confirmada</span></td>
                    </tr>`;
            });
        }
    }
    window.onload = cargarCitas;
</script>

  <footer>
    <p>&copy; 2025 Promodent. Panel administrativo.</p>
  </footer>
</body>
</html>
