<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expediente Pro - Promodent</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root { --primary: #026aa7; --accent: #f59e0b; --success: #10b981; --danger: #ef4444; }
    
    .folder-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 20px; max-width: 1400px; margin: 20px auto; padding: 0 15px; }
    .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #d1d9e6; margin-bottom: 20px; }

    /* ODONTOGRAMA OPTIMIZADO */
    .odontograma-container { 
      background: #f8fafc; 
      padding: 15px; 
      border-radius: 8px; 
      overflow-x: auto; /* Scroll si la pantalla es chica */
    }
    .arcada { 
      display: flex; 
      justify-content: center; 
      gap: 5px; 
      margin-bottom: 20px; 
      min-width: 800px; /* Evita que los dientes se amontonen */
    }
    .diente-pro { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      width: 45px; /* Tamaño fijo para que no crezcan de más */
    }
    .diente-num { font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #444; }
    
    /* El dibujo del diente */
    .diente-svg { width: 40px; height: 40px; touch-action: none; }
    .cara { fill: white; stroke: #666; stroke-width: 1; cursor: pointer; transition: 0.2s; }
    .cara:hover { stroke: #000; stroke-width: 1.5; }
    
    /* Colores de estados */
    .sana { fill: #ffffff; }
    .caries { fill: var(--danger); }
    .tratado { fill: #3b82f6; }
    .sellado { fill: var(--success); }
    .diente-ausente { opacity: 0.15; pointer-events: none; }

    /* UI general */
    textarea, input { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font-family: inherit; box-sizing: border-box; }
    .btn-action { color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    th { text-align: left; padding: 8px; background: #f1f5f9; }
    td { padding: 6px; border-bottom: 1px solid #eee; }
    .tag { padding: 4px 8px; background: #eee; border-radius: 12px; font-size: 0.75em; cursor: pointer; margin: 2px; display: inline-block; }
  </style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">Promodent</div>
    <ul class="nav-links"><li><a href="pacientes.html">← Volver</a></li></ul>
  </nav>
</header>

<main class="folder-grid">
  <section>
    <div class="card">
      <h2 id="p-nombre" style="color: var(--primary); margin:0;">Paciente</h2>
      <p id="p-meta" style="font-size: 0.9em; color: #666;"></p>
    </div>

    <div class="card">
      <h3>🦷 Odontograma Gráfico</h3>
      <p style="font-size: 0.8em; color: #888; margin-bottom: 10px;">Clic en las caras para: Blanco (Sano) → Rojo (Caries) → Azul (Resina) → Verde (Sellante)</p>
      
      <div class="odontograma-container">
        <div class="arcada" id="arcada-sup"></div>
        <div class="arcada" id="arcada-inf"></div>
      </div>
    </div>

    <div class="card">
      <h3>💰 Presupuesto y Tratamientos</h3>
      <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <input type="text" id="new-prod" placeholder="Tratamiento...">
        <input type="number" id="new-price" placeholder="$" style="width: 80px;">
        <button onclick="agregarPresupuesto()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:6px; cursor:pointer;">+</button>
      </div>
      <table>
        <thead><tr><th>Descripción</th><th>Precio</th><th></th></tr></thead>
        <tbody id="items-presupuesto"></tbody>
      </table>
      <h3 id="total-val" style="text-align: right; color: var(--primary); margin-top:10px;">Total: $0.00</h3>
      <button class="btn-action" style="background:#6366f1" onclick="imprimir('presupuesto')">Generar Proforma PDF</button>
    </div>
  </section>

  <aside>
    <div class="card" style="border-left: 5px solid var(--success);">
      <h3>💊 Recetario</h3>
      <textarea id="rece" rows="6" oninput="autoSave()" placeholder="Prescripción médica..."></textarea>
      <button class="btn-action" style="background:var(--success);" onclick="imprimir('receta')">Descargar Receta</button>
    </div>

    <div class="card" style="border-left: 5px solid var(--accent);">
      <h3>📜 Certificado Médico</h3>
      <textarea id="cert-cuerpo" rows="8" oninput="autoSave()" placeholder="Redacta el certificado aquí..."></textarea>
      <button class="btn-action" style="background:var(--accent);" onclick="imprimir('cert')">Descargar Certificado</button>
    </div>

    <div class="card">
      <h3>📝 Notas</h3>
      <textarea id="notas" rows="4" oninput="autoSave()" placeholder="Evolución clínica..."></textarea>
    </div>
  </aside>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const pacienteId = params.get('id');
  let db = JSON.parse(localStorage.getItem("promodent_pacientes")) || [];
  let p = db.find(item => item.id === pacienteId);

  function init() {
    if(!p) { alert("Error: Paciente no encontrado"); window.location.href='pacientes.html'; return; }
    document.getElementById('p-nombre').innerText = p.nombre;
    document.getElementById('p-meta').innerText = `Expediente: ${p.id} | Tel: ${p.telefono}`;
    document.getElementById('rece').value = p.receta_temp || "";
    document.getElementById('notas').value = p.notas || "";
    document.getElementById('cert-cuerpo').value = p.cert_temp || "";
    
    if(!p.odontograma) p.odontograma = {};
    if(!p.presupuesto) p.presupuesto = [];
    
    renderOdontograma();
    renderPresupuesto();
  }

  function renderOdontograma() {
    const sup = [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28];
    const inf = [48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];

    const drawArcada = (list, containerId) => {
      const cont = document.getElementById(containerId);
      cont.innerHTML = "";
      list.forEach(num => {
        const d = p.odontograma[num] || { t:'sana', b:'sana', l:'sana', r:'sana', c:'sana', ausente: false };
        const div = document.createElement('div');
        div.className = `diente-pro ${d.ausente ? 'diente-ausente' : ''}`;
        div.innerHTML = `
          <span class="diente-num">${num}</span>
          <svg class="diente-svg" viewBox="0 0 40 40">
            <polygon class="cara ${d.t}" points="0,0 40,0 30,10 10,10" onclick="cambiarEstado(${num},'t')"/>
            <polygon class="cara ${d.r}" points="40,0 40,40 30,30 30,10" onclick="cambiarEstado(${num},'r')"/>
            <polygon class="cara ${d.b}" points="0,40 40,40 30,30 10,30" onclick="cambiarEstado(${num},'b')"/>
            <polygon class="cara ${d.l}" points="0,0 0,40 10,30 10,10" onclick="cambiarEstado(${num},'l')"/>
            <rect class="cara ${d.c}" x="10" y="10" width="20" height="20" onclick="cambiarEstado(${num},'c')"/>
          </svg>
          <button onclick="toggleAusente(${num})" style="font-size:8px; margin-top:3px; cursor:pointer;">${d.ausente ? 'Poner':'Quitar'}</button>
        `;
        cont.appendChild(div);
      });
    };
    drawArcada(sup, 'arcada-sup');
    drawArcada(inf, 'arcada-inf');
  }

  function cambiarEstado(num, cara) {
    if(!p.odontograma[num]) p.odontograma[num] = { t:'sana', b:'sana', l:'sana', r:'sana', c:'sana', ausente: false };
    const estados = ['sana', 'caries', 'tratado', 'sellado'];
    let actual = p.odontograma[num][cara];
    let index = (estados.indexOf(actual) + 1) % estados.length;
    p.odontograma[num][cara] = estados[index];
    renderOdontograma();
    autoSave();
  }

  function toggleAusente(num) {
    if(!p.odontograma[num]) p.odontograma[num] = { t:'sana', b:'sana', l:'sana', r:'sana', c:'sana', ausente: false };
    p.odontograma[num].ausente = !p.odontograma[num].ausente;
    renderOdontograma();
    autoSave();
  }

  function agregarPresupuesto() {
    const n = document.getElementById('new-prod').value;
    const pr = document.getElementById('new-price').value;
    if(!n || !pr) return;
    p.presupuesto.push({ nombre: n, precio: parseFloat(pr) });
    document.getElementById('new-prod').value = "";
    document.getElementById('new-price').value = "";
    renderPresupuesto();
    autoSave();
  }

  function renderPresupuesto() {
    const list = document.getElementById('items-presupuesto');
    list.innerHTML = "";
    let total = 0;
    p.presupuesto.forEach((it, i) => {
      total += it.precio;
      list.innerHTML += `<tr><td>${it.nombre}</td><td>$${it.precio.toFixed(2)}</td><td><button onclick="p.presupuesto.splice(${i},1);renderPresupuesto();autoSave();" style="color:red; border:none; background:none; cursor:pointer;">×</button></td></tr>`;
    });
    document.getElementById('total-val').innerText = `Total: $${total.toFixed(2)}`;
  }

  function autoSave() {
    p.receta_temp = document.getElementById('rece').value;
    p.cert_temp = document.getElementById('cert-cuerpo').value;
    p.notas = document.getElementById('notas').value;
    localStorage.setItem("promodent_pacientes", JSON.stringify(db));
  }

  function imprimir(tipo) {
    const div = document.createElement('div');
    div.style.padding = "40px";
    div.style.fontFamily = "sans-serif";
    let html = `<h1 style="color:#026aa7; text-align:center;">PROMODENT</h1><hr><br>
                <p><strong>Paciente:</strong> ${p.nombre}</p><p><strong>Fecha:</strong> ${new Date().toLocaleDateString()}</p><br>`;

    if(tipo === 'presupuesto') {
      html += `<h3>PRESUPUESTO</h3><table><tr style="background:#eee"><th>Tratamiento</th><th>Costo</th></tr>`;
      let t = 0;
      p.presupuesto.forEach(it => { t += it.precio; html += `<tr><td>${it.nombre}</td><td>$${it.precio.toFixed(2)}</td></tr>`; });
      html += `<tr style="font-weight:bold"><td>TOTAL</td><td>$${t.toFixed(2)}</td></tr></table>`;
    } else if(tipo === 'cert') {
      html += `<h2>CERTIFICADO MÉDICO</h2><p style="line-height:1.8">${document.getElementById('cert-cuerpo').value}</p>`;
    } else {
      html += `<h3>RECETA</h3><p style="white-space:pre-wrap">${p.receta_temp}</p>`;
    }
    
    html += `<br><br><br><div style="text-align:center;"><p>_______________________</p><p>Firma y Sello</p></div>`;
    div.innerHTML = html;
    html2pdf().from(div).save(`${tipo}.pdf`);
  }

  window.onload = init;
</script>

</body>
</html>
